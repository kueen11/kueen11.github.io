<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一路生花前端效果</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a; /* 深色背景更能衬托花朵 */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="flowerCanvas"></canvas>

<script>
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');

    // 设置Canvas尺寸与窗口一致
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 花朵类
    class Flower {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = Math.random() * 15 + 10; // 花朵大小
            this.petalCount = Math.floor(Math.random() * 4) + 5; // 花瓣数量 5-8
            this.color = `hsl(${Math.random() * 360}, 80%, 60%)`; // 随机鲜艳颜色
            this.rotation = Math.random() * Math.PI * 2; // 初始旋转角度
            this.rotationSpeed = (Math.random() - 0.5) * 0.05; // 旋转速度
            this.opacity = 1;
            this.fadeSpeed = Math.random() * 0.01 + 0.005; // 渐隐速度
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color;

            // 绘制花瓣
            for (let i = 0; i < this.petalCount; i++) {
                ctx.beginPath();
                ctx.ellipse(0, 0, this.radius, this.radius / 2.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.rotate((Math.PI * 2) / this.petalCount);
            }

            // 绘制花蕊
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, 0, this.radius / 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        update() {
            this.rotation += this.rotationSpeed;
            this.opacity -= this.fadeSpeed;
        }
    }

    let flowers = [];

    // 监听鼠标移动，生成花朵
    canvas.addEventListener('mousemove', (e) => {
        // 限制生成频率，避免性能问题
        if (Math.random() > 0.7) { 
            flowers.push(new Flower(e.clientX, e.clientY));
        }
    });

    // 动画主循环
    function animate() {
        // 使用半透明黑色覆盖，实现拖尾渐隐效果
        ctx.fillStyle = 'rgba(26, 26, 26, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 更新并绘制所有花朵
        for (let i = flowers.length - 1; i >= 0; i--) {
            flowers[i].update();
            flowers[i].draw();

            // 移除完全透明的花朵，优化内存
            if (flowers[i].opacity <= 0) {
                flowers.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
